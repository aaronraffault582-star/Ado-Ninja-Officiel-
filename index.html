<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ado-Ninja | OFFICIEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- ÉCRAN DE DÉPART (OBLIGATOIRE) --- */
        #auth-screen {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #1a1a2e, #0b0f1a);
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .auth-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 35px; border-radius: 25px; border: 1px solid var(--neon-blue);
            width: 90%; max-width: 400px; text-align: center;
        }
        h1 { color: var(--neon-blue); margin-bottom: 20px; text-transform: uppercase; }

        /* --- LES CASES QUE TU VEUX --- */
        .input-group { margin-bottom: 10px; text-align: left; }
        label { font-size: 0.75rem; color: var(--neon-blue); margin-left: 5px; }
        input {
            width: 100%; padding: 12px; margin-top: 5px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        .btn-neon {
            width: 100%; padding: 15px; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* --- LE SITE CACHÉ --- */
        #main-app { display: none; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>ADO NINJA</h1>
            
            <div class="input-group">
                <label>Prénom</label>
                <input type="text" id="p-prenom" placeholder="Ton prénom...">
            </div>

            <div class="input-group">
                <label>Âge</label>
                <input type="number" id="p-age" placeholder="Ton âge...">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="p-email" placeholder="email@exemple.com">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="p-pass" placeholder="••••••••">
            </div>

            <button class="btn-neon" onclick="lancerSite()">S'INSCRIRE & ENTRER</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #888; cursor: pointer;">Déjà un compte ? Se connecter</p>
        </div>
    </div>

    <div id="main-app">
        <h2 id="welcome">Bienvenue !</h2>
        <p>Le site est maintenant débloqué.</p>
    </div>

    <script>
        function lancerSite() {
            const prenom = document.getElementById('p-prenom').value;
            if(!prenom) {
                alert("Ninja, remplis ton prénom !");
                return;
            }
            // CACHE LA CONNEXION ET MONTRE LE SITE
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('welcome').innerText = "Salut " + prenom + " ! 🥷";
        }
    </script>

</body>
</html>
