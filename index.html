<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ado-Ninja | Portail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: #0f172a;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px; width: 350px; text-align: center;
        }
        h1 { color: #00d2ff; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.1); border: 1px solid #334155;
            border-radius: 8px; color: white; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; background: #00d2ff;
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn:hover { background: #0095b3; }
        .footer { margin-top: 20px; font-size: 0.9rem; cursor: pointer; color: #94a3b8; }
        .footer span { color: #00d2ff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 id="title">ADO NINJA</h1>
        
        <div id="form-content">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn" id="mainBtn" onclick="valider()">SE CONNECTER</button>
        </div>

        <div class="footer" id="toggleArea">
            Pas de compte ? <span onclick="passerInscription()">S'inscrire</span>
        </div>
    </div>

    <script>
        // FONCTION POUR CHANGER LE FORMULAIRE
        function passerInscription() {
            document.getElementById('title').innerText = "INSCRIPTION";
            document.getElementById('mainBtn').innerText = "CRÉER MON COMPTE";
            document.getElementById('toggleArea').innerHTML = 'Déjà membre ? <span onclick="passerConnexion()">Se connecter</span>';
        }

        function passerConnexion() {
            document.getElementById('title').innerText = "ADO NINJA";
            document.getElementById('mainBtn').innerText = "SE CONNECTER";
            document.getElementById('toggleArea').innerHTML = 'Pas de compte ? <span onclick="passerInscription()">S\'inscrire</span>';
        }

        // FONCTION QUAND ON CLIQUE SUR LE BOUTON
        function valider() {
            const email = document.getElementById('email').value;
            const mdp = document.getElementById('pass').value;

            if(email === "" || mdp === "") {
                alert("Remplis les cases Ninja !");
            } else {
                alert("Accès autorisé pour : " + email + "\nBienvenue dans le clan.");
            }
        }
    </script>

</body>
</html>
