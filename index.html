<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ado-Ninja-Officiel-</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b0e14; height: 100vh; color: white; display: flex; justify-content: center; align-items: center; }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px; width: 380px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        h1 { color: #00d2ff; margin-bottom: 20px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(255, 255, 255, 0.1); border: 1px solid #334155;
            border-radius: 10px; color: white; outline: none;
        }

        .btn-action {
            width: 100%; padding: 15px; background: #00d2ff;
            border: none; border-radius: 10px; color: #000;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        .switch-link { margin-top: 20px; color: #ff007f; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
        .hidden { display: none !important; }

        /* Contenu du site après connexion */
        #site-prive { display: none; text-align: center; padding: 20px; }
        .welcome-card { border: 2px solid #00d2ff; padding: 40px; border-radius: 20px; background: #16213e; }
    </style>
</head>
<body>

    <div id="auth-section" class="glass-box">
        <h1 id="titre">ADO NINJA</h1>

        <div id="login-form">
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="entrer()">SE CONNECTER</button>
            <p class="switch-link" onclick="voirInscription()">Pas de compte ? S'inscrire</p>
        </div>

        <div id="signup-form" class="hidden">
            <input type="text" id="s-prenom" placeholder="Prénom">
            <input type="number" id="s-age" placeholder="Âge">
            <input type="email" id="s-email" placeholder="Email">
            <input type="password" id="s-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="entrer()">CRÉER MON COMPTE</button>
            <p class="switch-link" onclick="voirConnexion()">Déjà inscrit ? Se connecter</p>
        </div>
    </div>

    <div id="site-prive">
        <div class="welcome-card">
            <h1>BIENVENUE DANS LE CLAN 🥷</h1>
            <p style="margin-top: 20px;">Accès autorisé. Ton profil est actif sur Ado-Ninja-Officiel.</p>
            <button class="btn-action" style="width: 200px; margin-top: 20px;" onclick="location.reload()">DÉCONNEXION</button>
        </div>
    </div>

    <script>
        function voirInscription() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('titre').innerText = "REJOINDRE";
        }

        function voirConnexion() {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('titre').innerText = "ADO NINJA";
        }

        function entrer() {
            // Cache tout et montre le site
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('site-prive').style.display = 'block';
        }
    </script>
</body>
</html>
