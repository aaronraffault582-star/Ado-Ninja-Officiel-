<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ado-Ninja | VERSION OFFICIELLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; }

        /* --- ÉCRAN DE CONNEXION (DARK GLASS) --- */
        #auth-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #1a1a2e, #0b0f1a);
        }
        .auth-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            width: 380px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .auth-card h1 { color: var(--neon-blue); margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 2px; }
        input, select, textarea {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.08);
            border: 1px solid transparent; border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .btn-neon {
            width: 100%; padding: 15px; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- INTERFACE PRINCIPALE --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }

        /* BARRE DE NAVIGATION BASSE */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(15, 20, 30, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .nav-item { text-align: center; color: #888; cursor: pointer; font-size: 0.8rem; }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--neon-blue); }

        /* MENU LATÉRAL */
        #side-menu {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: #121826; transition: 0.4s; z-index: 200; padding: 20px;
            border-right: 1px solid var(--neon-blue);
        }
        #side-menu.open { left: 0; }
        .profile-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-purple); margin-bottom: 10px; }
        .badge-v { color: #00ffaa; font-size: 0.9rem; }
        .badge-p { color: #ffcc00; font-size: 0.9rem; }
        .menu-links div { padding: 15px; cursor: pointer; font-size: 1.1rem; border-radius: 10px; }
        .menu-links div:hover { background: rgba(0,210,255,0.1); color: var(--neon-blue); }

        /* ZONE CONTENU (SCROLLABLE) */
        .content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>ADO NINJA</h1>
            <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 20px;">VERSION OFFICIELLE</p>
            <input type="text" id="reg-name" placeholder="Prénom">
            <input type="number" id="reg-age" placeholder="Âge">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Mot de passe">
            <button class="btn-neon" onclick="login()">S'INSCRIRE</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: var(--neon-blue); cursor: pointer;">Mot de passe oublié ?</p>
        </div>
    </div>

    <div id="main-app">
        
        <div id="side-menu">
            <div class="profile-header">
                <img src="https://via.placeholder.com/80" class="profile-pic">
                <h3 id="user-display">Pseudo</h3>
                <p><span class="badge-v">✅ Vérifié</span> | <span class="badge-p">💎 Premium</span></p>
            </div>
            <div class="menu-links">
                <div onclick="showPage('home')"><i class="fas fa-home"></i> Accueil</div>
                <div onclick="showPage('premium')"><i class="fas fa-gem"></i> Premium</div>
                <div onclick="showPage('edit')"><i class="fas fa-user-edit"></i> Modifier Profil</div>
                <div onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Déconnexion</div>
            </div>
        </div>

        <div class="content">
            <div id="page-home">
                <div class="card">
                    <h2>Fil d'actualité</h2>
                    <p style="opacity: 0.6; margin-top: 10px;">Aucune annonce pour le moment. Sois le premier Ninja à poster !</p>
                </div>
            </div>

            <div id="page-edit" class="hidden">
                <div class="card">
                    <h2>Édition du Profil</h2>
                    <label>Orientation</label>
                    <select>
                        <option>Hétéro</option><option>Gay</option><option>Bi</option>
                        <option>Pan</option><option>Queer</option><option>En questionnement</option>
                    </select>
                    <label>Physique</label>
                    <input type="text" placeholder="Couleur cheveux / style">
                    <input type="number" placeholder="Taille (cm)">
                    <textarea rows="4" placeholder="Ta BIO (Surveillée par IA Gemini...)"></textarea>
                    <button class="btn-neon">SAUVEGARDER ✅</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item"><i class="fas fa-envelope"></i>Messages</div>
            <div class="nav-item"><i class="fas fa-bell"></i>Alerte</div>
            <div class="nav-item active"><i class="fas fa-users"></i>Amis</div>
            <div class="nav-item"><i class="fas fa-eye"></i>Vues</div>
            <div class="nav-item" onclick="toggleMenu()"><i class="fas fa-bars"></i>Menu</div>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('reg-name').value;
            if(!name) return alert("Prénom requis !");
            document.getElementById('user-display').innerText = name;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
        }

        function showPage(pageId) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-edit').classList.add('hidden');
            document.getElementById('page-' + pageId).classList.remove('hidden');
            toggleMenu();
        }
    </script>
</body>
</html>
